<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Leduc Hold'em</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        .waiting-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .waiting-overlay h2 {
            margin-bottom: 20px;
            color: var(--accent-gold, #ffcc33);
        }

        #player-role-tag {
            background: var(--accent-gold, #ffcc33);
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-left: 10px;
        }

        #connection-status {
            font-size: 0.9rem;
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div id="waiting-overlay" class="waiting-overlay">
        <h2>Waiting for Opponent...</h2>
        <p>Send this URL to your friend to play together.</p>
        <div id="connection-status">Connecting to server...</div>
    </div>

    <div id="app">
        <header>
            <h1>Leduc Hold'em <span id="player-role-display" style="font-size: 0.5em; opacity: 0.7;">Multiplayer</span>
            </h1>
            <div class="controls">
                <button class="reset-btn" id="reset-all-btn">Reset Stacks</button>
                <button class="reset-btn" id="reset-btn">New Game</button>
            </div>
        </header>

        <div id="game-table">
            <!-- Player 1 (Opponent if we are P0) -->
            <div class="player-slot" id="player-slot-1">
                <div class="player-info">
                    <span id="p1-name">Waiting...</span>
                    <div class="stack-display">Stack: <span id="p1-stack">100</span></div>
                </div>
                <div class="card-container" id="p1-card-container">
                    <div class="card hidden" id="p1-card">?</div>
                </div>
            </div>

            <!-- Community Card -->
            <div class="community-card hidden" id="board-card">?</div>

            <!-- Player 0 (You if we are P0) -->
            <div class="player-slot" id="player-slot-0">
                <div class="player-info">
                    <span id="p0-name">Waiting...</span>
                    <div class="stack-display">Stack: <span id="p0-stack">100</span></div>
                </div>
                <div class="card-container" id="p0-card-container">
                    <div class="card" id="p0-card">?</div>
                </div>
            </div>

            <div class="status-indicator">
                <div class="round-name" id="round-name">Pre-flop</div>
                <div class="pot-display">
                    Pot: <span class="pot-value" id="pot-total">0</span>
                </div>
            </div>
        </div>

        <div class="actions" id="user-actions">
            <button id="btn-fold" data-action="0" disabled>Fold</button>
            <button id="btn-call" data-action="1" disabled>Call / Check</button>
            <button id="btn-raise" data-action="2" disabled>Raise</button>
        </div>

        <div id="game-log">
            <div class="log-entry">Connecting to server...</div>
        </div>
    </div>

    <script src="multiplayer.js"></script>
</body>

</html>
