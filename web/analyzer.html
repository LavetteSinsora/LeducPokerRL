<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Value Analyzer - PokerRL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .episode-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .step-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .step-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .reward-badge {
            background: rgba(244, 208, 63, 0.1);
            color: var(--accent-gold);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .error-badge {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .eval-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .eval-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .eval-item.selected {
            border: 1px solid var(--accent-gold);
            background: rgba(244, 208, 63, 0.05);
        }

        .eval-val {
            font-size: 1.2rem;
            font-weight: 700;
            display: block;
            margin: 5px 0;
        }

        .final-summary {
            background: var(--accent-gold);
            color: #000;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <div class="header-left">
                <h1>Value Analyzer</h1>
                <nav class="nav-tabs">
                    <a href="index.html" class="nav-link">Play</a>
                    <a href="dashboard.html" class="nav-link">Training</a>
                    <a href="analyzer.html" class="nav-link active">Analyzer</a>
                </nav>
            </div>
            <div class="controls">
                <button id="run-debug-btn">Run Debug Episode</button>
            </div>
        </header>

        <div id="analyzer-content">
            <div class="placeholder-text" style="text-align:center; padding: 50px;">
                Click "Run Debug Episode" to visualize the agent's decision-making process.
            </div>
        </div>
    </div>
    <script src="analyzer.js"></script>
</body>

</html>
