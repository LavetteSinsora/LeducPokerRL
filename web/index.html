<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leduc Hold'em RL GUI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header>
            <div class="header-left">
                <h1>Leduc Hold'em</h1>
                <nav class="nav-tabs">
                    <a href="index.html" class="nav-link active">Play Game</a>
                    <a href="dashboard.html" class="nav-link">Training</a>
                </nav>
            </div>
            <div class="controls">
                <button class="reset-btn" id="reset-all-btn">Reset Stacks</button>
                <button class="reset-btn accent" id="reset-btn">New Game</button>
            </div>
        </header>

        <div id="game-table">
            <!-- Player 1 (Opponent) -->
            <div class="player-slot" id="player-slot-1">
                <div class="player-info">
                    <div class="agent-selector-dropdown">
                        <label>Agent:</label>
                        <select id="p1-agent-select" class="agent-select">
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                    <div class="stack-display">Stack: <span id="p1-stack">100</span></div>
                </div>
                <div class="card-container" id="p1-card-container">
                    <div class="card hidden" id="p1-card">?</div>
                </div>
            </div>

            <!-- Table Center -->
            <div class="table-center">
                <div class="round-label" id="round-name">Pre-flop</div>
                <div class="community-card hidden" id="board-card">?</div>
                <div class="pot-display">
                    Pot: <span class="pot-value" id="pot-total">0</span>
                </div>
            </div>

            <!-- Player 0 (User) -->
            <div class="player-slot" id="player-slot-0">
                <div class="player-info">
                    <div class="agent-selector-dropdown">
                        <label>Agent:</label>
                        <select id="p0-agent-select" class="agent-select">
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                    <div class="stack-display">Stack: <span id="p0-stack">100</span></div>
                </div>
                <div class="card-container" id="p0-card-container">
                    <div class="card" id="p0-card">?</div>
                </div>
            </div>
        </div>

        <div class="actions" id="user-actions">
            <button id="btn-fold" data-action="0">Fold</button>
            <button id="btn-call" data-action="1">Call / Check</button>
            <button id="btn-raise" data-action="2">Raise</button>
        </div>

        <div id="game-log">
            <div class="log-entry">Welcome to <span>Leduc Hold'em</span>. Press New Game to start.</div>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
